name: CI/CD(STAGING) - Build and Push to ECR

on:
  push:
    branches:
      - dev
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ECR
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref_name }}-v2
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        id: set-short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA::10}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME_STAGING }}:${{ steps.set-short-sha.outputs.SHORT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME_STAGING }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_PORTONE_STORE_ID=${{ secrets.NEXT_PUBLIC_PORTONE_STORE_ID }}
            NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${{ secrets.NEXT_PUBLIC_PORTONE_CHANNEL_KEY }}
            NEXT_PUBLIC_API_MOCKING=${{ secrets.NEXT_PUBLIC_API_MOCKING }}
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_NAVER_CLIENT_ID=${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}
            NEXT_PUBLIC_QUEUE_SOCKET_URL=${{ secrets.NEXT_PUBLIC_QUEUE_SOCKET_URL }}
            NEXT_PUBLIC_QUEUE_SOCKET_PATH=${{ secrets.NEXT_PUBLIC_QUEUE_SOCKET_PATH }}

      - name: Update GitOps deployment
        run: |
          DEPLOY_ENV=${{ github.ref_name == 'main' && 'prod' || 'staging' }}
          curl -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITOPS_TOKEN }}" \
            https://api.github.com/repos/kt-cloud-TECHUP-T1/gitops/dispatches \
            -d "{
              \"event_type\": \"deploy-v2\",
              \"client_payload\": {
                \"env\": \"${DEPLOY_ENV}\",
                \"image\": \"${{ steps.login-ecr.outputs.registry }}\",
                \"services\": [\"frontend\"],
                \"tag\": \"${{ steps.set-short-sha.outputs.SHORT_SHA }}\"
              }
            }"
